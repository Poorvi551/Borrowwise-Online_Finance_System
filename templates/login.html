<!DOCTYPE html>
<html>
<head>
    <title>User Login</title>
    <style>
        /* ---------- Body ---------- */
        body{
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fb, #e0f7fa);
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        /* ---------- Container ---------- */
        .container{
            width:350px;
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 15px 40px rgba(0,0,0,0.2);
            text-align:center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn{
            0%{opacity:0; transform: translateY(-30px);}
            100%{opacity:1; transform: translateY(0);}
        }

        h2{
            margin-bottom:30px;
            color:#111;
        }

        /* ---------- Inputs ---------- */
        input{
            width:100%;
            padding:12px 15px;
            margin-bottom:20px;
            border:2px solid #ddd;
            border-radius:50px;
            outline:none;
            font-size:15px;
            transition: 0.3s;
        }

        input:focus{
            border-color:#00bcd4;
            box-shadow:0 0 10px rgba(0,188,212,0.3);
        }

        /* ---------- Button ---------- */
        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:50px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            background: linear-gradient(90deg, #111, #00bcd4);
            color:white;
            transition: 0.4s;
        }

        button:hover{
            background: linear-gradient(90deg, #00bcd4, #111);
            transform: scale(1.05);
        }

        /* ---------- Error ---------- */
        .error{
            color:red;
            margin-top:15px;
            font-size:14px;
            animation: shake 0.3s;
        }

        @keyframes shake{
            0% {transform: translateX(0);}
            25% {transform: translateX(-5px);}
            50% {transform: translateX(5px);}
            75% {transform: translateX(-5px);}
            100% {transform: translateX(0);}
        }
    </style>
</head>
<body>

<div class="container">
    <h2>User Login</h2>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
        {% if error %}
        <p class="error">{{error}}</p>
        {% endif %}
    </form>
</div>

</body>
</html>
