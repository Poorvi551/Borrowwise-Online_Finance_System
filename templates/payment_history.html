<!DOCTYPE html>
<html>
<head>
<title>Payment History</title>
<style>
/* ---------- Body ---------- */
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg,#f5f7fb,#e0f7fa);
    margin:0;
    padding:0;
}

/* ---------- Heading ---------- */
h2 {
    text-align:center;
    color:#00796b;
    margin-top:40px;
    margin-bottom:20px;
}

/* ---------- Table ---------- */
table {
    width:90%;
    margin:auto;
    border-collapse: collapse;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* Table Header */
th {
    background: linear-gradient(90deg,#00796b,#26a69a);
    color: white;
    padding: 12px;
    font-weight: 600;
}

/* Table Cells */
td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #ddd;
    transition: background 0.3s, color 0.3s;
}

/* Zebra Rows */
tr:nth-child(even) td {
    background: #f1f9f8;
}

/* Hover Effect on Row */
tr:hover td {
    background: #b2dfdb;
    color: #004d40;
    font-weight: bold;
}

/* Download Button */
a {
    display: inline-block;
    background: #00796b;
    color: white;
    padding: 8px 15px;
    text-decoration: none;
    border-radius: 6px;
    transition: background 0.3s, transform 0.3s, box-shadow 0.3s;
}

a:hover {
    background: #26a69a;
    transform: translateY(-2px); /* small lift, doesn't affect layout */
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

/* Responsive Table */
@media (max-width: 768px) {
    table, th, td {
        font-size: 14px;
    }

    a {
        padding: 6px 12px;
        font-size: 14px;
    }
}
</style>
</head>
<body>

<h2>Payment History</h2>

<table>
<tr>
<th>Amount</th>
<th>Method</th>
<th>Date</th>
<th>Receipt</th>
</tr>

{% for payment in payments %}
<tr>
<td>₹ {{payment.amount}}</td>
<td>{{payment.payment_method}}</td>
<td>{{payment.payment_date}}</td>
<td>
<a href="/download-receipt/{{payment.id}}">Download</a>
</td>
</tr>
{% endfor %}

</table>

</body>
</html>
