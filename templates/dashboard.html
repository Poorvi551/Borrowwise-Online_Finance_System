<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
/* ---------- Body ---------- */
body {
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg,#f5f7fb,#e0f7fa);
}

/* ---------- Navbar ---------- */
.navbar {
    background: linear-gradient(90deg, #00bcd4, #26c6da);
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom: 2px solid #00acc1;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    border-radius: 0 0 12px 12px;
}

.navbar a {
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:500;
    transition:0.3s;
}

.navbar a:hover {
    color:#e0f7fa;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
}

/* ---------- Container ---------- */
.container {
    padding:40px 30px;
}

/* ---------- Summary Cards ---------- */
.summary-cards {
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
    margin-bottom:30px;
}

.card-summary {
    background:white;
    width:200px;
    padding:25px 20px;
    text-align:center;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    transition:0.4s;
    cursor:pointer;
}

.card-summary:hover {
    transform: translateY(-10px);
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.card-summary h3 {
    margin:0;
    font-size:16px;
    color:#555;
}

.card-summary p {
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
    color:#111;
}

/* ---------- Account Card ---------- */
.card {
    background:white;
    padding:30px 25px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    transition:0.4s;
    max-width:400px;
    margin:auto;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.card h3 {
    margin-top:0;
    color:#111;
}

.card p {
    margin:8px 0;
    font-size:16px;
    color:#555;
}

.card img {
    margin-top:15px;
    border-radius:50%;
    width:150px;
    border:4px solid #00bcd4;
    transition:0.3s;
}

.card img:hover {
    transform: scale(1.05);
}

/* ---------- Welcome ---------- */
h2 {
    text-align:center;
    color:#111;
    margin-bottom:30px;
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div>EasyLoan Dashboard</div>
    <div>
        <a href="/dashboard/">Dashboard</a>
        <a href="/apply-loan/">Apply Loan</a>
        <a href="/loan-status/">Loan Status</a>
        <a href="/emi-calculator/">EMI Calculator</a>
        
        <a href="/emi-payment/">EMI Payment</a>
        <a href="/emi-status/">EMI Status</a>
        <a href="/payment-history/">Payment History</a>
        <!-- <a href="/loan-analytics/">Loan Analytics</a> -->
        <a href="/logout/">Logout</a>
    </div>
</div>

<div class="container">

<h2>Welcome {{user.full_name}}</h2>

<!-- User Account Details -->
<div class="card">
<h3>Account Details</h3>
<p><strong>Email:</strong> {{user.email}}</p>
<p><strong>Phone:</strong> {{user.phone}}</p>
<p><strong>City:</strong> {{user.city}}</p>
{% if user_profile.profile_image %}
    <img src="{{ user_profile.profile_image.url }}" alt="Profile Picture">
{% else %}
    <img src="/static/default_profile.png" alt="Default Profile">
{% endif %}
</div>

</div>
</body>
</html>
